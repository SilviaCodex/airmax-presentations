<div class="cx-footer">
  <span class="cx-page"></span>
  <span> | Brilliant Minds in the Digital World</span>
</div>

<script src="dist/reveal.js"></script>
<script src="plugin/markdown/markdown.js"></script>
<script>
  Reveal.initialize({
    hash: true,
    width: 1280,
    height: 720,
    margin: 0,
    minScale: 0.2,
    maxScale: 2.0,
    transition: 'fade',
    transitionSpeed: 'fast',
    controls: true,
    progress: true,
    slideNumber: false,
    plugins: [ RevealMarkdown ]
  });

  Reveal.on('ready', function () {
    document.querySelectorAll('.reveal .slides section').forEach(function (section) {
      if (!section.querySelector('.cx-logo')) {
        var logo = document.createElement('div');
        logo.className = 'cx-logo';
        section.appendChild(logo);
      }
    });
    updateFooter();
  });

  function updateFooter() {
    var current      = Reveal.getSlidePastCount() + 1;
    var currentSlide = Reveal.getCurrentSlide();
    var footer       = document.querySelector('.cx-footer');

    if (currentSlide && currentSlide.classList.contains('cx-title')) {
      footer.style.opacity = '0';
    } else {
      footer.style.opacity = '1';
      document.querySelector('.cx-footer .cx-page').textContent =
        String(current).padStart(2, '0');
    }
  }

  Reveal.on('slidechanged', updateFooter);
</script>

</html>

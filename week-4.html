<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Codexitos – Markdown Template</title>

  <link rel="stylesheet" href="dist/reset.css">
  <link rel="stylesheet" href="dist/reveal.css">
  <link rel="stylesheet" href="dist/theme/codexitos.css">
</head>
<body>
<div class="reveal">
  <div class="slides">

    <!-- TITLE SLIDE ─────────────────────────────── -->
    <section class="cx-title"
             data-background-image="dist/theme/codexitos-assets/image1.jpeg"
             data-background-size="cover"
             data-markdown>
      <textarea data-template>
# Airmax Connect Phase 2 - Core Platform Build
## Weekly Review 04 - Mar 20th
<p class="cx-date">March 2026</p>
      </textarea>
    </section>

    <!-- SECTION DIVIDER ─────────────────────────── -->
    <section class="cx-divider"
             data-background-image="dist/theme/codexitos-assets/image5.jpeg"
             data-background-size="cover"
             data-markdown>
      <textarea data-template>
## Phase 2 Roadmap (12 Weeks)
      </textarea>
    </section>

    <!-- CONTENT: Executive Summary ──────────────── -->
    <section class="cx-content" data-markdown>
      <textarea data-template>
## Phase 2 Roadmap (12 Weeks)

- **Weeks 1–4** → Foundation & Cloud Infrastructure Setup ✅  
- **Weeks 5–8** → Feature Development & Integration *(In Progress)*  
- **Weeks 9–11** → Stabilization, User Testing & Refinement  
- **Week 12** → Pilot Validation & Go-Live Readiness  

> Transitioning from foundation into structured feature development.
      </textarea>
    </section>

    <!-- CONTENT: Sprint Velocity ────────────────── -->
    <section class="cx-content" data-markdown>
      <textarea data-template>
## Weeks 1–4: Platform Capabilities Delivered

- Structured operations through branches  
- Role-based user access and management  
- Core operational structure in place (customers, sites, installations, devices)  
- Standardized installation setup based on device data  
- Clear ownership and visibility across teams  
- Device and product foundation ready for configuration
      </textarea>
    </section>
    <!-- CONTENT: Milestones ─────────────────────── -->
    <section class="cx-content" data-markdown>
      <textarea data-template>
## Week 4 Progress – Enabling Operational Setup

- Platform organized into branches, improving team structure and responsibility ownership  
- Secure and controlled user management aligned with role-based access  
- Introduction of installations as a core operational entity  
- Installations can now be created with or without device data  
- Alignment between installations and organizational structure for improved visibility

      </textarea>
    </section>
    <!-- SECTION DIVIDER ─────────────────────────── -->
    <section class="cx-divider"
             data-background-image="dist/theme/codexitos-assets/image5.jpeg"
             data-background-size="cover"
             data-markdown>
      <textarea data-template>
        ## Demo

Capabilities implemented during Week 4
      </textarea>
    </section>



    <!-- CONTENT: Key Risks ──────────────────────── -->
    <section class="cx-content" data-markdown>
      <textarea data-template>
## Next Steps – Week 5

- Enable branch-based visibility so users access only relevant data  
- Allow configuration of equipment behavior through mappings and parameters  
- Provide visibility into configuration status (sent, applied, failed)  
- Introduce telemetry monitoring for device performance tracking
      </textarea>
    </section>

    <!-- CLOSING SLIDE ───────────────────────────── -->
    <section class="cx-title"
             data-background-image="dist/theme/codexitos-assets/image1.jpeg"
             data-background-size="cover"
             data-markdown>
      <textarea data-template>
# Thank You
## Q&A
<p class="cx-date">Airmax Connect</p>
      </textarea>
    </section>

  </div><!-- /.slides -->
</div><!-- /.reveal -->

<div class="cx-footer">
  <span class="cx-page"></span>
  <span> | Brilliant Minds in the Digital World</span>
</div>

<script src="dist/reveal.js"></script>
<script src="plugin/markdown/markdown.js"></script>
<script>
  Reveal.initialize({
    hash: true,
    width: 1280,
    height: 720,
    margin: 0,
    minScale: 0.2,
    maxScale: 2.0,
    transition: 'fade',
    transitionSpeed: 'fast',
    controls: true,
    progress: true,
    slideNumber: false,
    plugins: [ RevealMarkdown ]
  });

  Reveal.on('ready', function () {
    document.querySelectorAll('.reveal .slides section').forEach(function (section) {
      if (!section.querySelector('.cx-logo')) {
        var logo = document.createElement('div');
        logo.className = 'cx-logo';
        section.appendChild(logo);
      }
    });
    updateFooter();
  });

  function updateFooter() {
    var current      = Reveal.getSlidePastCount() + 1;
    var currentSlide = Reveal.getCurrentSlide();
    var footer       = document.querySelector('.cx-footer');

    if (currentSlide && currentSlide.classList.contains('cx-title')) {
      footer.style.opacity = '0';
    } else {
      footer.style.opacity = '1';
      document.querySelector('.cx-footer .cx-page').textContent =
        String(current).padStart(2, '0');
    }
  }

  Reveal.on('slidechanged', updateFooter);
</script>
</body>
</html>
